version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: aicoding-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - aicoding-net
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong@Passw0rd" -C -Q "SELECT 1" || exit 1
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: aicoding-sqlserver-init
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./db/init.sql:/init.sql
    networks:
      - aicoding-net
    entrypoint: ["/opt/mssql-tools18/bin/sqlcmd", "-S", "sqlserver", "-U", "sa", "-P", "YourStrong@Passw0rd", "-C", "-i", "/init.sql"]
    restart: "no"

  api:
    build:
      context: ./src/Api
      dockerfile: Dockerfile
    container_name: aicoding-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=AIcoding;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;
    networks:
      - aicoding-net
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: nginx:alpine
    container_name: aicoding-web
    ports:
      - "8080:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - aicoding-net
    depends_on:
      - api
    restart: unless-stopped

networks:
  aicoding-net:
    driver: bridge

volumes:
  sqlserver_data:

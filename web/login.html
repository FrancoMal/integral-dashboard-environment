<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesion - CashFlowApp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/dashboard.css" />
</head>
<body class="login-page">

  <div class="login-card" role="main">
    <div class="login-header">
      <div class="login-logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="white">
          <path d="M12 1v4M12 19v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M1 12h4M19 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
          <circle cx="12" cy="12" r="5" fill="none" stroke="white" stroke-width="2"/>
          <path d="M12 9v3l2 1" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <h1>CashFlowApp</h1>
      <p>Gestion financiera personal</p>
    </div>

    <div class="login-body">
      <div class="login-error" id="loginError" role="alert">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="loginErrorText"></span>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="username">Usuario</label>
          <input
            class="form-input"
            type="text"
            id="username"
            name="username"
            placeholder="Ingresa tu usuario"
            autocomplete="username"
            required
            autofocus
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Contrasena</label>
          <input
            class="form-input"
            type="password"
            id="password"
            name="password"
            placeholder="Ingresa tu contrasena"
            autocomplete="current-password"
            required
          />
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
          Iniciar Sesion
        </button>
      </form>
    </div>

    <div class="login-footer">
      <p>Usuario por defecto: <strong>admin</strong> / <strong>admin123</strong></p>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (Auth.redirectIfAuthenticated()) return;

      const form = document.getElementById('loginForm');
      const errorBox = document.getElementById('loginError');
      const errorText = document.getElementById('loginErrorText');
      const loginBtn = document.getElementById('loginBtn');

      function showError(msg) {
        errorText.textContent = msg;
        errorBox.classList.add('visible');
      }

      function hideError() {
        errorBox.classList.remove('visible');
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError();

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        if (!username || !password) {
          showError('Completa todos los campos');
          return;
        }

        loginBtn.disabled = true;
        loginBtn.textContent = 'Ingresando...';

        try {
          await Auth.login(username, password);
          window.location.href = '/index.html';
        } catch (err) {
          showError(err.message || 'Error al iniciar sesion');
          loginBtn.disabled = false;
          loginBtn.textContent = 'Iniciar Sesion';
        }
      });
    });
  </script>
</body>
</html>
